# Ruff Configuration
# https://docs.astral.sh/ruff/configuration/

target-version = "py312"
line-length = 100
src = ["src", "tests"]

[lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "ARG",    # flake8-unused-arguments
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "PTH",    # flake8-use-pathlib
    "ERA",    # eradicate (commented code)
    "PL",     # Pylint
    "RUF",    # Ruff-specific rules
    "D",      # pydocstyle (docstrings)
]
ignore = [
    "E501",    # line too long (handled by formatter)
    "B008",    # do not perform function calls in argument defaults (FastAPI Depends)
    "PLR0913", # too many arguments
    "PLR2004", # magic value comparison
    "D100",    # Missing docstring in public module
    "D104",    # Missing docstring in public package
    "D105",    # Missing docstring in magic method (__post_init__, etc.)
    "D106",    # Missing docstring in public nested class
    "D107",    # Missing docstring in __init__
]

[lint.pydocstyle]
convention = "google"

[lint.isort]
known-first-party = ["src"]

[lint.per-file-ignores]
"tests/**/*" = ["ARG", "PLR2004", "D"]  # No docstring requirements in tests
"src/**/migrations/*" = ["D", "ERA"]     # No docstrings in migrations

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
